services:
  smart-contract-audit-slither-image:
    platform: ${AUDIT_SLITHER_DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/slither/Dockerfile
      args:
        SLITHER_ANALYZER_VERSION: ${AUDIT_SLITHER_ANALYZER_VERSION:-}
        SOLC_VERSIONS: ${AUDIT_SLITHER_SOLC_VERSIONS:-0.4.26,0.5.17,0.6.12,0.7.6,0.8.20,0.8.24}
        PIP_INDEX_URL: ${AUDIT_SLITHER_PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${AUDIT_SLITHER_PIP_TRUSTED_HOST:-}
    image: ${AUDIT_SLITHER_DOCKER_IMAGE:-smart-contract-audit-slither:local}
    profiles: ["tooling"]

  smart-contract-audit-aderyn-image:
    platform: ${AUDIT_ADERYN_DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/aderyn/Dockerfile
      args:
        ADERYN_VERSION: ${AUDIT_ADERYN_VERSION:-0.6.8}
        ADERYN_ARTIFACT_URL: ${AUDIT_ADERYN_ARTIFACT_URL:-https://github.com/cyfrin/aderyn/releases/download/aderyn-v0.6.8/aderyn-x86_64-unknown-linux-gnu.tar.xz}
    image: ${AUDIT_ADERYN_DOCKER_IMAGE:-smart-contract-audit-aderyn:local}
    profiles: ["tooling"]

  smart-contract-audit-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_contract_audit
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  smart-contract-audit-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-contract-audit-mcp:local
    command: ["node", "src/sdk-http-server.js"]
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MCP_HTTP_PATH: /mcp
      DATABASE_URL: postgresql://postgres:postgres@smart-contract-audit-db:5432/smart_contract_audit
      AUDIT_SLITHER_DOCKER_IMAGE: ${AUDIT_SLITHER_DOCKER_IMAGE:-smart-contract-audit-slither:local}
      AUDIT_SLITHER_DOCKER_PLATFORM: ${AUDIT_SLITHER_DOCKER_PLATFORM:-linux/amd64}
      AUDIT_ADERYN_DOCKER_IMAGE: ${AUDIT_ADERYN_DOCKER_IMAGE:-smart-contract-audit-aderyn:local}
      AUDIT_ADERYN_DOCKER_PLATFORM: ${AUDIT_ADERYN_DOCKER_PLATFORM:-linux/amd64}
      AUDIT_AI_ENABLED: ${AUDIT_AI_ENABLED:-auto}
      AUDIT_AI_MODEL: ${AUDIT_AI_MODEL:-gpt-4o-mini}
      AUDIT_AI_EMBEDDING_MODEL: ${AUDIT_AI_EMBEDDING_MODEL:-text-embedding-3-small}
      AUDIT_AI_BASE_URL: ${AUDIT_AI_BASE_URL:-}
      AUDIT_AI_API_KEY: ${AUDIT_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - smart-contract-audit-db
    restart: unless-stopped

  smart-contract-audit-mcp-worker:
    image: smart-contract-audit-mcp:local
    command: ["node", "src/audit-worker.js"]
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MCP_HTTP_PATH: /mcp
      DATABASE_URL: postgresql://postgres:postgres@smart-contract-audit-db:5432/smart_contract_audit
      AUDIT_SLITHER_DOCKER_IMAGE: ${AUDIT_SLITHER_DOCKER_IMAGE:-smart-contract-audit-slither:local}
      AUDIT_SLITHER_DOCKER_PLATFORM: ${AUDIT_SLITHER_DOCKER_PLATFORM:-linux/amd64}
      AUDIT_ADERYN_DOCKER_IMAGE: ${AUDIT_ADERYN_DOCKER_IMAGE:-smart-contract-audit-aderyn:local}
      AUDIT_ADERYN_DOCKER_PLATFORM: ${AUDIT_ADERYN_DOCKER_PLATFORM:-linux/amd64}
      AUDIT_AI_ENABLED: ${AUDIT_AI_ENABLED:-auto}
      AUDIT_AI_MODEL: ${AUDIT_AI_MODEL:-gpt-4o-mini}
      AUDIT_AI_EMBEDDING_MODEL: ${AUDIT_AI_EMBEDDING_MODEL:-text-embedding-3-small}
      AUDIT_AI_BASE_URL: ${AUDIT_AI_BASE_URL:-}
      AUDIT_AI_API_KEY: ${AUDIT_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - smart-contract-audit-db
      - smart-contract-audit-mcp-http
    restart: unless-stopped

volumes:
  postgres-data:
