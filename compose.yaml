services:
  smart-contract-audit-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-contract-audit-mcp:local
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MCP_HTTP_PATH: /mcp
    restart: unless-stopped

