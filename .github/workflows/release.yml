name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/smart-contract-audit-mcp

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      package_private: ${{ steps.package_meta.outputs.package_private }}
      package_name: ${{ steps.package_meta.outputs.package_name }}
      package_version: ${{ steps.package_meta.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Read package metadata
        id: package_meta
        run: |
          echo "package_private=$(node -p "require('./package.json').private ? 'true' : 'false'")" >> "$GITHUB_OUTPUT"
          echo "package_name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "package_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create npm tarball
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"

  publish_docker:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish_npm:
    needs: package
    if: needs.package.outputs.package_private != 'true' && secrets.NPM_TOKEN != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

